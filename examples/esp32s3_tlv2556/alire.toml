version = "0.1.0-dev"

authors = ["D. Howells"]
maintainers = ["D. Howells <dhowells@motium.us>"]
licenses = "Apache-2.0 WITH LLVM-exception"
tags = ["embedded", "esp32s3", "spi", "adc", "tlv2556", "driver", "example"]

project-files = ["tlv2556.gpr"]

[[depends-on]]
