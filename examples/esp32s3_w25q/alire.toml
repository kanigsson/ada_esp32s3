name = "esp32s3_w25q"
description = "Bare-metal Ada W25Q256FV SPI NOR flash bring-up (JEDEC ID, erase, page-program, read-back) over SPI2 with an application-driven chip select on IO21"
version = "0.1.0-dev"

authors = ["D. Howells"]
maintainers = ["D. Howells <dhowells@motium.us>"]
licenses = "Apache-2.0 WITH LLVM-exception"
tags = ["embedded", "esp32s3", "spi", "flash", "w25q", "nor", "driver", "example"]

project-files = ["w25q.gpr"]

[[depends-on]]
esp32s3_rts = "*"

[[pins]]
esp32s3_rts = { path = "../../crates/esp32s3_rts" }
xtensa_dynconfig       = { path = "../../crates/xtensa-dynconfig" }
